name: Tag On Version Bump

on:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
      should_tag: ${{ steps.version.outputs.current != steps.version.outputs.previous && steps.existing-tag.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current and previous Mix version
        id: version
        shell: bash
        run: |
          current_version="$(sed -n 's/^  @version "\([^"]*\)"$/\1/p' mix.exs | head -n1)"
          previous_version="$(git show HEAD^:mix.exs 2>/dev/null | sed -n 's/^  @version "\([^"]*\)"$/\1/p' | head -n1)"

          if [ -z "$current_version" ]; then
            echo "Failed to read current mix.exs version" >&2
            exit 1
          fi

          echo "current=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous=$previous_version" >> "$GITHUB_OUTPUT"

      - name: Skip if version did not change
        if: steps.version.outputs.current == steps.version.outputs.previous
        run: echo "mix.exs version unchanged; no release tag created"

      - name: Check if release tag already exists
        if: steps.version.outputs.current != steps.version.outputs.previous
        id: existing-tag
        run: |
          if git rev-parse -q --verify "refs/tags/v${{ steps.version.outputs.current }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.current }} already exists; skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  tag:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_tag == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push release tag
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "v$VERSION"
          git push origin "v$VERSION"
